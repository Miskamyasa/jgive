server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name jgive.miskamyasa.me;

    client_max_body_size 1m;
    limit_req zone=ten burst=100;

    root /config/www/jgive.miskamyasa.me/dist;

    include /config/nginx/ssl.conf;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Rails API
    location ^~ /api/ {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app jgive_backend;
        set $upstream_port 80;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # Rails health check
    location = /up {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app jgive_backend;
        set $upstream_port 80;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # Static assets
    location ~* \.(?:css|js|svg|jpg|png|jpeg|woff2|gif|ico)$ {
        expires 1w;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        try_files $uri =404;
    }

    # Astro SPA/static fallback
    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
