# /opt/docker-compose.yml
---
x-env: &env
    PUID: 1000
    PGID: 1000
    TZ: Etc/UTC

services:
    jgive_backend:
        build:
            context: /opt/appdata/jgive_backend/src
        image: jgive_backend:latest
        container_name: jgive_backend
        environment:
            <<: *env
            RAILS_ENV: production
            RAILS_LOG_TO_STDOUT: "1"
            RAILS_SERVE_STATIC_FILES: "1"
        env_file: .env.jgive_backend
        volumes:
            - /opt/appdata/jgive_backend/storage:/rails/storage
        mem_limit: 512m
        restart: always
        ports:
            - 3000:80
